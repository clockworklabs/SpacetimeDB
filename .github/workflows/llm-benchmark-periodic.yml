name: Periodic LLM benchmarks

on:
  schedule:
    # Daily at midnight UTC. Change to '0 */6 * * *' for every 6h,
    # or '0 */4 * * *' for every 4h.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      models:
        description: 'Models to run (provider:model format, comma-separated, or "all")'
        required: false
        default: 'all'
      languages:
        description: 'Languages to benchmark (comma-separated: rust,csharp,typescript)'
        required: false
        default: 'rust,csharp,typescript'
      modes:
        description: 'Modes to run (comma-separated: guidelines,no_context,docs,...)'
        required: false
        default: 'guidelines,no_context'

permissions:
  contents: write

concurrency:
  group: llm-benchmark-periodic
  cancel-in-progress: true

jobs:
  run-benchmarks:
    runs-on: spacetimedb-new-runner
    container:
      image: localhost:5000/spacetimedb-ci:latest
      options: >-
        --privileged
    timeout-minutes: 180

    steps:
      - name: Install spacetime CLI
        run: |
          curl -sSf https://install.spacetimedb.com | sh -s -- -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WASI workload
        env:
          DOTNET_MULTILEVEL_LOOKUP: "0"
          DOTNET_CLI_HOME: ${{ runner.temp }}/dotnet-home
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
        run: |
          dotnet workload install wasi-experimental --skip-manifest-update --disable-parallel

      - name: Build llm-benchmark tool
        run: cargo install --path tools/xtask-llm-benchmark --locked

      - name: Run benchmarks
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Fallback to direct keys if set
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_BENCHMARK_API_KEY: ${{ secrets.LLM_BENCHMARK_API_KEY }}
          MSBUILDDISABLENODEREUSE: "1"
          DOTNET_CLI_USE_MSBUILD_SERVER: "0"
        run: |
          LANGS="${{ inputs.languages || 'rust,csharp,typescript' }}"
          MODELS="${{ inputs.models || 'all' }}"
          MODES="${{ inputs.modes || 'guidelines,no_context' }}"
          UPLOAD_FLAG=""
          if [ -n "${{ secrets.LLM_BENCHMARK_UPLOAD_URL }}" ]; then
            UPLOAD_FLAG="--upload-url ${{ secrets.LLM_BENCHMARK_UPLOAD_URL }}"
          fi

          for LANG in $(echo "$LANGS" | tr ',' ' '); do
            if [ "$MODELS" = "all" ]; then
              llm_benchmark run --lang "$LANG" --modes "$MODES" $UPLOAD_FLAG || true
            else
              llm_benchmark run --lang "$LANG" --modes "$MODES" --models "$MODELS" $UPLOAD_FLAG || true
            fi
          done

      - name: Generate summary
        run: llm_benchmark summary || true

      - name: Archive historical results
        run: |
          DATE=$(date -u +%Y-%m-%dT%H-%M-%S)
          mkdir -p docs/llms/history
          for f in docs/llms/llm-comparison-details.json docs/llms/llm-comparison-summary.json; do
            if [ -f "$f" ]; then
              BASENAME=$(basename "$f" .json)
              cp "$f" "docs/llms/history/${DATE}_${BASENAME}.json"
            fi
          done
          # Regenerate manifest.json listing all history files (sorted)
          ls docs/llms/history/*.json 2>/dev/null \
            | xargs -I{} basename {} \
            | grep -v manifest.json \
            | sort \
            | jq -R . | jq -s . > docs/llms/history/manifest.json

      - name: Ensure only docs/llms changed
        run: |
          set -euo pipefail
          CHANGED="$(git diff --name-only)"
          if [ -z "$CHANGED" ]; then
            echo "No changes."
            exit 0
          fi
          if echo "$CHANGED" | grep -qvE '^docs/llms/'; then
            echo "Benchmark produced changes outside docs/llms:"
            echo "$CHANGED" | grep -vE '^docs/llms/'
            exit 1
          fi

      - name: Commit and push results
        run: |
          git config user.name "clockwork-labs-bot"
          git config user.email "clockwork-labs-bot@users.noreply.github.com"
          git add docs/llms
          git diff --cached --quiet && exit 0
          git commit -m "Update LLM benchmark results (periodic run)"
          git push origin master
