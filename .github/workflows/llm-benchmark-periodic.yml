name: Periodic LLM benchmarks

on:
  schedule:
    # Weekly on Monday at midnight UTC.
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      model_set:
        description: 'Model set to run'
        required: false
        type: choice
        options:
          - website_active
          - local_defaults
          - explicit
        default: website_active
      models:
        description: 'Space-separated provider:model groups. Required when model_set=explicit.'
        required: false
        default: ''
      languages:
        description: 'Languages to benchmark (comma-separated: rust,csharp,typescript)'
        required: false
        default: 'rust,csharp,typescript'
      modes:
        description: 'Modes to run (comma-separated: guidelines,no_context,docs,...)'
        required: false
        default: 'guidelines,no_context'
      categories:
        description: 'Optional benchmark categories to run (comma-separated)'
        required: false
        default: ''
      tasks:
        description: 'Optional benchmark task ids/selectors to run (comma-separated)'
        required: false
        default: ''
      dry_run:
        description: 'Run benchmarks without uploading results'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare_matrix:
    name: Prepare benchmark matrix
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.matrix.outputs.languages }}
    steps:
      - id: matrix
        env:
          INPUT_LANGUAGES: ${{ inputs.languages || 'rust,csharp,typescript' }}
        run: |
          languages="$(jq -cn --arg value "$INPUT_LANGUAGES" '$value | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')"
          echo "languages=$languages" >> "$GITHUB_OUTPUT"

  run-benchmarks:
    name: Run benchmarks (${{ matrix.lang }})
    needs: prepare_matrix
    runs-on: spacetimedb-new-runner-2

    strategy:
      fail-fast: false
      matrix:
        lang: ${{ fromJSON(needs.prepare_matrix.outputs.languages) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Setup .NET SDK
        if: matrix.lang == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install WASI workload
        if: matrix.lang == 'csharp'
        env:
          DOTNET_MULTILEVEL_LOOKUP: "0"
          DOTNET_CLI_HOME: ${{ runner.temp }}/dotnet-home
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
        run: |
          dotnet workload install wasi-experimental --skip-manifest-update --disable-parallel

      - name: Pack C# runtime packages
        if: matrix.lang == 'csharp'
        run: |
          dotnet pack -c Release crates/bindings-csharp/BSATN.Runtime
          dotnet pack -c Release crates/bindings-csharp/Runtime

      - name: Set up Node.js
        if: matrix.lang == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        if: matrix.lang == 'typescript'
        uses: ./.github/actions/setup-pnpm
        with:
          run_install: true

      - name: Build TypeScript SDK
        if: matrix.lang == 'typescript'
        run: pnpm build
        working-directory: crates/bindings-typescript

      - name: Build llm-benchmark tool
        run: cargo install --path tools/xtask-llm-benchmark --locked

      - name: Build SpacetimeDB server for benchmark harness
        run: |
          cargo ci smoketests prepare
          mkdir -p "$HOME/.local/bin"
          ln -sf "$GITHUB_WORKSPACE/target/release/spacetimedb-cli" "$HOME/.local/bin/spacetime"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run benchmarks
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_VENDOR: openrouter
          LLM_BENCHMARK_API_KEY: ${{ secrets.LLM_BENCHMARK_API_KEY }}
          LLM_BENCHMARK_UPLOAD_URL: ${{ vars.LLM_BENCHMARK_UPLOAD_URL }}
          DOTNET_MULTILEVEL_LOOKUP: "0"
          DOTNET_CLI_HOME: ${{ runner.temp }}/dotnet-home
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
          MSBUILDDISABLENODEREUSE: "1"
          DOTNET_CLI_USE_MSBUILD_SERVER: "0"
          LLM_BENCH_CONCURRENCY: "8"
          LLM_BENCH_RUST_CONCURRENCY: "4"
          LLM_BENCH_CSHARP_CONCURRENCY: "2"
          LLM_BENCH_ROUTE_CONCURRENCY: ${{ matrix.lang == 'typescript' && '4' || '2' }}
          LLM_BENCH_RUST_TARGET_DIR: ${{ runner.temp }}/llm-benchmark-rust-target
          INPUT_LANGUAGE: ${{ matrix.lang }}
          INPUT_MODEL_SET: ${{ inputs.model_set || 'website_active' }}
          INPUT_MODELS: ${{ inputs.models || '' }}
          INPUT_MODES: ${{ inputs.modes || 'guidelines,no_context' }}
          INPUT_CATEGORIES: ${{ inputs.categories || '' }}
          INPUT_TASKS: ${{ inputs.tasks || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          LANG="$INPUT_LANGUAGE"
          MODEL_SET="$INPUT_MODEL_SET"
          MODELS="$INPUT_MODELS"
          MODES="$INPUT_MODES"
          CATEGORIES="$INPUT_CATEGORIES"
          TASKS="$INPUT_TASKS"
          DRY_RUN="$INPUT_DRY_RUN"

          case "$MODEL_SET" in
            website_active)
              if [ -n "$MODELS" ]; then
                echo "::error::models is only valid when model_set=explicit"
                exit 1
              fi
              ;;
            local_defaults)
              if [ -n "$MODELS" ]; then
                echo "::error::models is only valid when model_set=explicit"
                exit 1
              fi
              ;;
            explicit)
              if [ -z "$MODELS" ]; then
                echo "::error::models is required when model_set=explicit"
                exit 1
              fi
              read -r -a MODEL_ARGS <<< "$MODELS"
              ;;
            *)
              echo "::error::unknown model_set '$MODEL_SET' (expected website_active, local_defaults, or explicit)"
              exit 1
              ;;
          esac

          EXTRA_ARGS=()
          if [ -n "$CATEGORIES" ]; then
            EXTRA_ARGS+=(--categories "$CATEGORIES")
          fi
          if [ -n "$TASKS" ]; then
            EXTRA_ARGS+=(--tasks "$TASKS")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            EXTRA_ARGS+=(--dry-run)
          fi

          if [ "$MODEL_SET" = "website_active" ]; then
            llm_benchmark run --lang "$LANG" --modes "$MODES" --model-source remote "${EXTRA_ARGS[@]}"
          elif [ "$MODEL_SET" = "local_defaults" ]; then
            llm_benchmark run --lang "$LANG" --modes "$MODES" "${EXTRA_ARGS[@]}"
          else
            llm_benchmark run --lang "$LANG" --modes "$MODES" --models "${MODEL_ARGS[@]}" "${EXTRA_ARGS[@]}"
          fi
