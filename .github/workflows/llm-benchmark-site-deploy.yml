name: Deploy LLM Benchmark Dashboard

on:
  push:
    branches: [master]
    paths:
      - 'docs/llms/**'
      - 'tools/llm-benchmark-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/llm-benchmark-site/package-lock.json

      - name: Install dependencies
        working-directory: tools/llm-benchmark-site
        run: npm ci

      - name: Build site
        working-directory: tools/llm-benchmark-site
        run: npm run build

      # Assemble the Pages artifact with site 2 levels deep so that
      # the hardcoded data path "../../docs/llms/" resolves correctly:
      #   https://<host>/<repo>/llm/benchmark/ → ../../docs/llms/ → /docs/llms/
      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/llm/benchmark
          cp -r tools/llm-benchmark-site/dist/. _site/llm/benchmark/
          mkdir -p _site/docs/llms/history
          cp docs/llms/*.json _site/docs/llms/ 2>/dev/null || true
          if [ -d docs/llms/history ]; then
            cp docs/llms/history/*.json _site/docs/llms/history/ 2>/dev/null || true
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
