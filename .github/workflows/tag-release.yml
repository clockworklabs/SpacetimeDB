on:
  release:
    types: [published]

permissions: {}

jobs:
  on-release:
    name: Re-tag latest
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          # Docker Hub access tokens are passed to docker/login-action via the password input.
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Retag the image 
        run: |
          VERSION=${GITHUB_REF#refs/*/}
          docker buildx imagetools create clockworklabs/spacetimedb:$VERSION --tag clockworklabs/spacetimedb:latest

  announce-release:
    name: Announce GitHub release
    runs-on: ubuntu-latest
    needs: on-release
    if: always()
    steps:
      - name: Send Discord notification
        run: |
          set -euo pipefail

          message="SpacetimeDB GitHub release published: [${{github.event.release_name}}](<${{github.event.release.html_url}}>)"

          data="$(jq --null-input --arg msg "$message" '.content=$msg')"
          curl -X POST -H 'Content-Type: application/json' -d "$data" "${{ secrets.DISCORD_WEBHOOK_RELEASE_CHANNEL_URL }}"
