name: Public Discord Release Notifications

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_body:
        description: 'Release body/description'
        required: true
        default: 'This is a test release body. It can contain **markdown** and multiple lines.'
      release_tag:
        description: 'Release tag'
        required: true
        default: 'v0.0.0-test'
      release_url:
        description: 'Release URL'
        required: true
        default: 'https://github.com/clockworklabs/SpacetimeDB/releases'
      dry_run:
        description: 'Dry run (print message instead of sending)'
        required: false
        type: boolean
        default: true

jobs:
  publicDiscordNotification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.PUBLIC_DISCORD_WEBHOOK_URL }}
          RELEASE_BODY: ${{ github.event.release.body || github.event.inputs.release_body }}
          RELEASE_URL: ${{ github.event.release.html_url || github.event.inputs.release_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
        run: |
          # Construct the Discord message with the release title and body
          message="**SpacetimeDB ${RELEASE_TAG}**"
          message+=$'\n\n'
          message+="View the full release notes:"
          message+=$'\n'
          message+="${RELEASE_URL}"
          message+=$'\n\n'
          message+="${RELEASE_BODY}"

          # Use jq to construct the JSON payload for the webhook
          data="$(jq --null-input \
            --arg content "$message" \
            '.content=$content')"

          # Dry run: just print what would be sent
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN - Message that would be sent to Discord ==="
            echo "JSON payload:"
            echo "$data" | jq .
            echo ""
            echo "Formatted message preview:"
            echo "$message"
            echo ""
            echo "=== End of dry run ==="
          else
            # Send the webhook
            echo "Sending Discord notification..."
            curl -X POST \
              -H 'Content-Type: application/json' \
              -d "$data" \
              "${DISCORD_WEBHOOK_URL}"
          fi
