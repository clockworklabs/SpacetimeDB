name: Check merge labels

on:
  pull_request:
    types: [labeled, unlabeled]
  merge_group:
permissions: read-all

jobs:
  label_checks:
    name: Check merge labels
    runs-on: ubuntu-latest
    steps:
      - if: contains(github.event.pull_request.labels.*.name, 'do not merge')
        run: exit 0

      - if: contains(github.event.pull_request.labels.*.name, 'do not merge')
        run: |
          echo "This is labeled \"Do not merge\"."
          exit 1
