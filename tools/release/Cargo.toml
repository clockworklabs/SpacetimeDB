[package]
name = "spacetimedb-release"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[[bin]]
name = "cargo-release"
path = "src/main.rs"

[dependencies]
clap = { version = "4.4", features = ["derive"] }
toml = "0.8.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
duct.workspace = true
