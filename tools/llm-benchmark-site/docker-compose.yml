services:
  dev:
    build:
      context: ../..
      dockerfile: tools/llm-benchmark-site/Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      # Source — changes here trigger HMR instantly
      - ../../tools/llm-benchmark-site/src:/app/tools/llm-benchmark-site/src
      - ../../tools/llm-benchmark-site/index.html:/app/tools/llm-benchmark-site/index.html
      - ../../tools/llm-benchmark-site/vite.config.ts:/app/tools/llm-benchmark-site/vite.config.ts
      - ../../tools/llm-benchmark-site/tsconfig.json:/app/tools/llm-benchmark-site/tsconfig.json
      # Data files — served by the vite middleware
      - ../../docs/llms:/app/docs/llms:ro
