# Infrastructure for the sequential upgrade benchmark.
# Run: docker compose -f docker-compose.otel.yaml up -d

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # gRPC receiver
      - "4318:4318"   # HTTP receiver
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
      - ./telemetry:/telemetry
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]

  postgres:
    image: postgres:16
    ports:
      - "6432:5432"
    environment:
      POSTGRES_USER: spacetime
      POSTGRES_PASSWORD: spacetime
      POSTGRES_DB: spacetime
    volumes:
      - llm-sequential-upgrade-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacetime"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Standard MERN-stack MongoDB: single node, manual Socket.io for real-time
  # (deliberately NOT a replica set / change streams — keeps the comparison
  # symmetric with the Postgres backend).
  mongodb:
    image: mongo:7
    ports:
      - "6437:27017"
    volumes:
      - llm-sequential-upgrade-mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1})"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  llm-sequential-upgrade-pgdata:
  llm-sequential-upgrade-mongodata:
