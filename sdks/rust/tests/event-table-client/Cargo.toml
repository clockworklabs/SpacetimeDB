[package]
name = "event-table-client"
version.workspace = true
edition.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]

# Builds the existing CLI test client.
native = [
    "dep:env_logger",
    "dep:tokio",
]

# Builds the client for wasm32-unknown-unknown using the Rust SDK `browser` backend.
browser = [
    "spacetimedb-sdk/browser",
    "dep:wasm-bindgen",
    "dep:wasm-bindgen-futures",
    "dep:console_error_panic_hook",
    "dep:futures",
]

[[bin]]
name = "event-table-client"
path = "src/main.rs"
required-features = ["native"]

[dependencies]
spacetimedb-sdk = { path = "../.." }
test-counter = { path = "../test-counter" }
anyhow.workspace = true
env_logger = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
futures = { workspace = true, optional = true }

wasm-bindgen = { version = "0.2.100", optional = true }
wasm-bindgen-futures = { version = "0.4.45", optional = true }
console_error_panic_hook = { version = "0.1.7", optional = true }

[lints]
workspace = true
