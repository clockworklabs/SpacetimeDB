version: '3'

vars:
  GO_MODULE: github.com/clockworklabs/SpacetimeDB/sdks/go

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run all Go tests
    cmds:
      - go test ./...

  test:bsatn:
    desc: Run BSATN package tests
    cmds:
      - go test ./bsatn/...

  test:types:
    desc: Run types package tests
    cmds:
      - go test ./types/...

  test:client:
    desc: Run client package tests
    cmds:
      - go test ./client/...

  test:server:
    desc: Run server package tests (native stubs)
    cmds:
      - go test ./server/...

  test:integration:
    desc: Run integration tests (requires running SpacetimeDB)
    cmds:
      - go test ./tests/integration/... -v -count=1

  test:conformance:
    desc: Run conformance tests
    cmds:
      - go test ./tests/conformance/... -v -count=1

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  build:
    desc: Build all packages
    cmds:
      - go build ./...

  build:wasm:
    desc: Build test WASM module with Go
    env:
      GOOS: wasip1
      GOARCH: wasm
    cmds:
      - go build -buildmode=c-shared -o tests/integration/server_module/module.wasm ./tests/integration/server_module/

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  generate:golden:
    desc: Generate golden byte files from Rust reference
    cmds:
      - go generate ./tests/golden/...

  build:sdk-test-module:
    desc: Build sdk-test-go WASM module with Go
    dir: ../../modules/sdk-test-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:benchmark-module:
    desc: Build benchmarks-go WASM module with Go
    dir: ../../modules/benchmarks-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:connect-disconnect-module:
    desc: Build sdk-test-connect-disconnect-go WASM module
    dir: ../../modules/sdk-test-connect-disconnect-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:event-table-module:
    desc: Build sdk-test-event-table-go WASM module
    dir: ../../modules/sdk-test-event-table-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:perf-test-module:
    desc: Build perf-test-go WASM module
    dir: ../../modules/perf-test-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:keynote-benchmarks-module:
    desc: Build keynote-benchmarks-go WASM module
    dir: ../../modules/keynote-benchmarks-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:view-module:
    desc: Build sdk-test-view-go WASM module
    dir: ../../modules/sdk-test-view-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:procedure-module:
    desc: Build sdk-test-procedure-go WASM module
    dir: ../../modules/sdk-test-procedure-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:module-test-module:
    desc: Build module-test-go WASM module
    dir: ../../modules/module-test-go
    cmds:
      - go generate ./...
      - mkdir -p target
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o target/module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:basic-go-server:
    desc: Build basic-go server WASM module
    dir: ../../templates/basic-go/spacetimedb
    cmds:
      - go generate ./...
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:basic-go-client:
    desc: Build basic-go client
    dir: ../../templates/basic-go
    cmds:
      - go build -o basic-go-client .

  build:chat-console-go-server:
    desc: Build chat-console-go server WASM module
    dir: ../../templates/chat-console-go/spacetimedb
    cmds:
      - go generate ./...
      - cmd: go build -buildmode=c-shared -ldflags="-s -w" -o module.wasm .
        env:
          GOOS: wasip1
          GOARCH: wasm

  build:chat-console-go-client:
    desc: Build chat-console-go client
    dir: ../../templates/chat-console-go
    cmds:
      - go build -o chat-console-go-client .

  build:all-modules:
    desc: Build all Go WASM modules
    cmds:
      - task: build:sdk-test-module
      - task: build:benchmark-module
      - task: build:connect-disconnect-module
      - task: build:event-table-module
      - task: build:perf-test-module
      - task: build:keynote-benchmarks-module
      - task: build:view-module
      - task: build:procedure-module
      - task: build:module-test-module
      - task: build:basic-go-server
      - task: build:chat-console-go-server

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f tests/integration/server_module/module.wasm
      - rm -f ../../modules/sdk-test-go/target/module.wasm
      - rm -f ../../modules/benchmarks-go/target/module.wasm
      - rm -f ../../modules/sdk-test-connect-disconnect-go/target/module.wasm
      - rm -f ../../modules/sdk-test-event-table-go/target/module.wasm
      - rm -f ../../modules/perf-test-go/target/module.wasm
      - rm -f ../../modules/keynote-benchmarks-go/target/module.wasm
      - rm -f ../../modules/sdk-test-view-go/target/module.wasm
      - rm -f ../../modules/sdk-test-procedure-go/target/module.wasm
      - rm -f ../../modules/module-test-go/target/module.wasm
      - rm -f ../../templates/basic-go/spacetimedb/module.wasm
      - rm -f ../../templates/basic-go/basic-go-client
      - rm -f ../../templates/chat-console-go/spacetimedb/module.wasm
      - rm -f ../../templates/chat-console-go/chat-console-go-client
      - go clean -cache

  check:
    desc: Run all checks (fmt, vet, lint, test)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test
