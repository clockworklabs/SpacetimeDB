[package]
name = "spacetimedb-test-runtime-node"
version.workspace = true
edition.workspace = true
license-file = "LICENSE"
description = "Node native adapter for SpacetimeDB TypeScript module unit tests."
rust-version.workspace = true

[lib]
name = "spacetimedb_test_runtime_node"
path = "src/lib.rs"
crate-type = ["cdylib"]
bench = false

[dependencies]
spacetimedb-lib = { workspace = true, features = ["serde"] }
spacetimedb-primitives.workspace = true
spacetimedb-test-datastore.workspace = true

napi = { version = "3", default-features = false, features = ["napi8"] }
napi-derive = "3"
serde_json.workspace = true

[lints]
workspace = true
