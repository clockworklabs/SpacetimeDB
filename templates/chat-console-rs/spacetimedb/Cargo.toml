[package]
name = "quickstart-chat-module"
version = "0.1.0"
edition = "2021"
license-file = "LICENSE"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib"]

[dependencies]
spacetimedb = { path = "../../../crates/bindings" }
log.workspace = true

[dev-dependencies]
# Enables `spacetimedb::test_utils::ALL_TABLE_NAMES`, a link-time slice
# containing every table name registered by the `#[table]` macro.
# Only active during `cargo test` — has no effect on the WASM build.
spacetimedb = { path = "../../../crates/bindings", features = ["test-utils", "unstable"] }
